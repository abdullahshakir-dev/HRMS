services:
  hrms.application:
    image: hrms.application
    build:
      context: .
      dockerfile: HRMS.Application/Dockerfile
    depends_on:
      - postgres
    ports:
      - "8081:8080"
    environment:
      - ConnectionStrings__DefaultString=Host=postgres;Port=5432;Database=HRManagementSystemDb;Username=postgres;Password=postgres
      - ASPNETCORE_ENVIRONMENT=Development

  postgres:
    image: postgres:16
    container_name: hrms-db
    restart: unless-stopped
    ports:
      - "5434:5432"
    environment: 
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: HRManagementSystemDb
    volumes:
      - pgdata:/var/lib/postgresql/data
    
volumes:
  pgdata: